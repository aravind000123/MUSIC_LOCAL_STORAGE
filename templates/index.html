<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Player</title>
    <style>
        body {
            margin: 0; min-height: 100vh;
            background: linear-gradient(125deg, #ffffff, #e0f7fa, #fce4ec, #f1f8e9);
            background-size: 400% 400%;
            animation: smokeMove 15s ease infinite;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes smokeMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%; max-width: 600px;
            margin-top: 50px; padding-bottom: 130px;
        }

        .song-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            margin: 10px 0; padding: 15px;
            border-radius: 12px; cursor: pointer;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.3);
        }

        .song-card:hover { background: #cdbd18; transform: scale(1.02); }

        .player-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
        }

        audio { width: 80%; margin-top: 10px; }
        .current-title { font-weight: bold; color: #333; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎵 My Library</h2>
        {% for song in songs %}
        <div class="song-card" onclick="playSong('{{ song }}')">
            {{ song.split('/')[-1] }}
        </div>
        {% endfor %}
    </div>

    <div class="player-bar">
        <div class="current-title" id="trackName">Select a song</div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <script>
        const audio = document.getElementById('audioPlayer');
        const trackName = document.getElementById('trackName');

        function playSong(filename) {
            audio.src = "/download/" + encodeURIComponent(filename);
            trackName.innerText = filename.split('/').pop();
            audio.play();
        }
    </script>
</body>
</html>
